name: Build OBS Toolbar

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: choco install cmake ninja git -y

    - name: Clone OBS Studio
      run: git clone --depth 1 https://github.com/obsproject/obs-studio.git

    - name: Configure
      run: cmake -B build -S . -G Ninja -Dlibobs_DIR=obs-studio/build

    - name: Build
      run: cmake --build build --config Release

    - name: Upload plugin
      uses: actions/upload-artifact@v4
      with:
        name: obs-toolbar
        path: build
